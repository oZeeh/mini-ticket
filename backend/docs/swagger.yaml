definitions:
  enums.Role:
    enum:
    - NONE
    - ADMIN
    - ASSIGNEE
    - USER
    type: string
    x-enum-varnames:
    - None
    - Admin
    - Assignee
    - User
  enums.TicketStatus:
    enum:
    - NONE
    - OPEN
    - DONE
    type: string
    x-enum-varnames:
    - None
    - Open
    - Done
  models.CreateTicketRequest:
    properties:
      description:
        type: string
      title:
        type: string
    required:
    - description
    - title
    type: object
  models.CreateUserRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
      role:
        $ref: '#/definitions/enums.Role'
    type: object
  models.CreateUserResponse:
    properties:
      email:
        type: string
      id:
        type: string
      name:
        type: string
      password:
        type: string
    type: object
  models.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  models.LoginResponse:
    properties:
      token:
        type: string
    type: object
  models.TicketEntity:
    properties:
      assigned_to:
        type: string
      description:
        type: string
      id:
        type: string
      status:
        $ref: '#/definitions/enums.TicketStatus'
      title:
        type: string
      user_id:
        type: string
    type: object
  models.UpdateTicketRequest:
    properties:
      assigned_to:
        type: string
      description:
        type: string
      id:
        type: string
      status:
        $ref: '#/definitions/enums.TicketStatus'
      title:
        type: string
    type: object
  models.User:
    properties:
      email:
        type: string
      id:
        type: string
      name:
        type: string
      password:
        type: string
      role:
        $ref: '#/definitions/enums.Role'
    type: object
